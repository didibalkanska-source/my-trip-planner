  <rect x="130" y="270" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="204" y="270" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="278" y="270" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="352" y="270" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="426" y="270" width="30" height="16" rx="8" fill="#b2dde2"/>

  <!-- Row 3 — y=320 -->
  <rect x="56"  y="320" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="130" y="320" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="204" y="320" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="278" y="320" width="52" height="16" rx="8" fill="#b2dde2"/>
