  <rect x="426" y="320" width="30" height="16" rx="8" fill="#b2dde2"/>

  <!-- Row 4 — y=370 -->
  <rect x="56"  y="370" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="130" y="370" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="204" y="370" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="278" y="370" width="52" height="16" rx="8" fill="#b2dde2"/>
