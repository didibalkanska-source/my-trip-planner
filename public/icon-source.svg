<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1fb8c4"/>
      <stop offset="100%" style="stop-color:#0d7a85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="32" y="80" width="448" height="400" rx="36" fill="white"/>

  <!-- Calendar header -->
  <rect x="32" y="80" width="448" height="116" rx="36" fill="#0d9aa8"/>
  <rect x="32" y="160" width="448" height="36" fill="#0d9aa8"/>

  <!-- Rings -->
  <rect x="148" y="44" width="28" height="72" rx="14" fill="white"/>
  <rect x="336" y="44" width="28" height="72" rx="14" fill="white"/>

  <!-- Row 1 — y=220 -->
  <rect x="56"  y="220" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="130" y="220" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="204" y="220" width="52" height="16" rx="8" fill="#b2dde2"/>
  <rect x="278" y="220" width="52" height="16" rx="8" fill="#b2dde2"/>
